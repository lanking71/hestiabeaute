services:

  # ── 백엔드: FastAPI + SQLite ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hestia_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      # NPM에서 사용하는 도메인 추가 (도메인 확정 후 변경)
      CORS_ORIGINS: "http://localhost:8082,http://localhost:8083,https://www.hestiabeaute.com/,https://hestiabeaute.com/"
    ports:
      - "8083:8000"   # NPM → /api, /static 라우팅용
    volumes:
      - db_data:/app/db              # SQLite DB 영속화 (디렉토리로 마운트)
      - uploads:/app/static/uploads  # 업로드 이미지 영속화
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hestia_net

  # ── 프론트엔드: Next.js 14 standalone ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 브라우저에서 사용할 API URL
        # NPM에서 /api 를 backend로 라우팅하므로 동일 도메인 사용
        # 예: https://your-domain.com/api  또는  http://서버IP:8082/api
        NEXT_PUBLIC_API_URL: "https://www.hestiabeaute.com/api"
    container_name: hestia_frontend
    restart: unless-stopped
    ports:
      - "8082:3000"   # NPM → 프론트엔드 메인 진입점
    environment:
      # SSR 시 Docker 내부 네트워크로 직접 접근 (빠름)
      INTERNAL_API_URL: "http://backend:8000/api"
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hestia_net

# ── 볼륨 (데이터 영속화) ───────────────────────────────────────────────────────
volumes:
  db_data:
    name: hestia_db_data
  uploads:
    name: hestia_uploads

# ── 네트워크 ───────────────────────────────────────────────────────────────────
networks:
  hestia_net:
    name: hestia_network
    driver: bridge
